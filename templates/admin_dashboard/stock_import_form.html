{% extends 'admin_dashboard/base.html' %}

{% block title %}Nhập hàng vào kho{% endblock %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0">Nhập hàng vào kho</h1>
            </div>
        </div>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="card">
            <form method="post">
                {% csrf_token %}
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    
                    <div class="form-group">
                        <label>Sản phẩm *</label>
                        <select name="product" class="form-control" required>
                            <option value="">-- Chọn sản phẩm --</option>
                            {% for product in products %}
                            <option value="{{ product.id }}">{{ product.name }} ({{ product.farm.name }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Số lượng *</label>
                                <input type="number" name="quantity" class="form-control" required min="1">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Đơn giá nhập *</label>
                                <input type="number" step="0.01" name="unit_price" class="form-control" required min="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Nhà cung cấp</label>
                        <select name="supplier" class="form-control">
                            <option value="">-- Chọn nhà cung cấp --</option>
                            {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Ghi chú</label>
                        <textarea name="notes" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-download"></i> Nhập hàng
                    </button>
                    <a href="{% url 'food_store:admin_inventory' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
