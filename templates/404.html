{% extends 'base/base.html' %}
{% load static %}

{% block title %}404 - Không tìm thấy trang{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 text-center">
                <div class="error-content">
                    <h1 class="error-code">404</h1>
                    <h2 class="error-title">Không tìm thấy trang</h2>
                    <p class="error-description">
                        Xin lỗi, trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.
                    </p>
                    <div class="error-actions mt-4">
                        <a href="{% url 'food_store:home' %}" class="btn btn-primary btn-lg me-2">
                            <i class="fas fa-home"></i> Về trang chủ
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-arrow-left"></i> Quay lại
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .error-page {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        color: white;
    }

    .error-code {
        font-size: 120px;
        font-weight: 800;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .error-title {
        font-size: 36px;
        font-weight: 600;
        margin-bottom: 20px;
    }

    .error-description {
        font-size: 18px;
        margin-bottom: 30px;
        opacity: 0.9;
    }

    .error-actions .btn {
        padding: 12px 30px;
        font-size: 16px;
        border-radius: 50px;
        transition: all 0.3s ease;
    }

    .error-actions .btn-primary {
        background: white;
        color: #28a745;
        border: none;
    }

    .error-actions .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .error-actions .btn-outline-secondary {
        border: 2px solid white;
        color: white;
    }

    .error-actions .btn-outline-secondary:hover {
        background: white;
        color: #28a745;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
