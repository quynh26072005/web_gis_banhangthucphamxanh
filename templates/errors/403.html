<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Truy cập bị từ chối | Clean Food GIS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .error-code {
            font-size: 150px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        .error-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: shake 3s infinite;
        }
        .error-title {
            font-size: 36px;
            font-weight: 600;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .error-message {
            font-size: 18px;
            margin: 20px 0;
            opacity: 0.9;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-home {
            background: white;
            color: #f5576c;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            color: #f093fb;
            text-decoration: none;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            border-color: white;
        }
        .btn-login {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .btn-login:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            border-color: white;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .reasons {
            margin-top: 30px;
            text-align: left;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }
        .reasons ul {
            list-style: none;
            padding: 0;
        }
        .reasons li {
            padding: 8px 0;
            padding-left: 30px;
            position: relative;
        }
        .reasons li:before {
            content: "✗";
            position: absolute;
            left: 0;
            font-weight: bold;
            color: #ffeb3b;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-ban"></i>
            </div>
            <div class="error-code">403</div>
            <div class="error-title">Truy cập bị từ chối</div>
            <div class="error-message">
                Xin lỗi, bạn không có quyền truy cập vào trang này.
            </div>
            
            <div class="reasons">
                <strong><i class="fas fa-exclamation-triangle"></i> Có thể do:</strong>
                <ul>
                    <li>Bạn chưa đăng nhập vào hệ thống</li>
                    <li>Tài khoản của bạn không có quyền truy cập</li>
                    <li>Bạn đang cố truy cập trang của chi nhánh khác</li>
                    <li>Phiên đăng nhập đã hết hạn</li>
                </ul>
            </div>

            <div style="margin-top: 40px;">
                <a href="/" class="btn-home">
                    <i class="fas fa-home"></i> Về trang chủ
                </a>
                <br>
                <a href="/accounts/login/" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </a>
                <a href="javascript:history.back()" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
            </div>
        </div>
    </div>
</body>
</html>
