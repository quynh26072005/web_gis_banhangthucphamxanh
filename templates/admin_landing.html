<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Clean Food GIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .admin-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .admin-icon {
            font-size: 80px;
            color: #667eea;
            margin-bottom: 30px;
        }
        
        .admin-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .admin-subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .btn-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .btn-back {
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .btn-back:hover {
            color: #764ba2;
        }
        
        .features {
            margin-top: 40px;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: #555;
        }
        
        .feature-icon {
            color: #667eea;
            margin-right: 15px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="admin-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h1 class="admin-title">Admin Panel</h1>
        <p class="admin-subtitle">Hệ thống Quản trị Clean Food GIS</p>
        
        <a href="/quan-tri/" class="btn btn-admin">
            <i class="fas fa-sign-in-alt me-2"></i>
            Đăng nhập Admin
        </a>
        
        <div class="features">
            <div class="feature-item">
                <i class="fas fa-store feature-icon"></i>
                <span>Quản lý Cửa hàng & Sản phẩm</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-shopping-cart feature-icon"></i>
                <span>Quản lý Đơn hàng & Khách hàng</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-map-marked-alt feature-icon"></i>
                <span>Công cụ GIS & Bản đồ</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-chart-line feature-icon"></i>
                <span>Thống kê & Báo cáo</span>
            </div>
        </div>
        
        <div style="margin-top: 30px;">
            <a href="/" class="btn-back">
                <i class="fas fa-arrow-left me-2"></i>
                Quay lại Trang chủ
            </a>
        </div>
    </div>
</body>
</html>
